{% extends 'base.html' %}
{% load socialaccount %}
{% block title %}Вхід{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="eyebrow"><span class="led"></span>Вхід</div>
  <h2 class="mb-4">З поверненням</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary w-100 mt-2">Увійти</button>
  </form>
  <p class="mt-2 mb-0" style="font-size: 0.85rem;"><a href="{% url 'accounts:password_reset' %}" style="color: var(--signal);">Забули пароль?</a></p>

  <div class="d-flex align-items-center my-3">
    <hr style="flex: 1; border-color: var(--border); margin: 0;">
    <span class="text-muted mx-2" style="font-size: 0.82rem;">або</span>
    <hr style="flex: 1; border-color: var(--border); margin: 0;">
  </div>

  <a href="{% provider_login_url 'google' %}" class="btn btn-outline-light w-100" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px;">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Увійти через Google
  </a>

  <p class="text-muted mt-3 mb-0">Ще нема акаунта? <a href="{% url 'accounts:register' %}">Зареєструватись</a></p>
</div>
{% endblock %}
