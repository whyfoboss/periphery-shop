{% extends 'base.html' %}
{% block title %}Новий пароль{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="eyebrow"><span class="led"></span>Новий пароль</div>
  <h2 class="mb-3">Задайте новий пароль</h2>
  <form method="post">
    {% csrf_token %}
    {% if form.errors %}
    <div class="alert alert-danger" style="background: rgba(255,85,85,0.1); border: 1px solid rgba(255,85,85,0.3); color: #ff5555; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px;">
      {% for field, errors in form.errors.items %}
        {% for error in errors %}<div>{{ error }}</div>{% endfor %}
      {% endfor %}
    </div>
    {% endif %}
    <div class="mb-3">
      <label class="form-label" style="color: var(--text); font-size: 0.85rem;">Новий пароль</label>
      <input type="password" name="new_password1" class="form-control" required autofocus
        style="background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px;">
    </div>
    <div class="mb-3">
      <label class="form-label" style="color: var(--text); font-size: 0.85rem;">Підтвердіть пароль</label>
      <input type="password" name="new_password2" class="form-control" required
        style="background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px;">
    </div>
    <button type="submit" class="btn btn-primary w-100 mt-2">Змінити пароль</button>
  </form>
</div>
{% endblock %}
