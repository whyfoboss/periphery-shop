{% extends "base.html" %}
{% load i18n %}
{% block title %}Вхід через Google{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="eyebrow"><span class="led"></span>Google</div>
  <h2 class="mb-3">Увійти через Google</h2>
  <p class="text-muted mb-4">Ви збираєтесь увійти, використовуючи обліковий запис стороннього сервісу Google.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary w-100">Продовжити</button>
  </form>
  <div class="text-center mt-3">
    <a href="{% url 'accounts:login' %}" class="text-muted" style="font-size: 0.85rem;">← Назад до входу</a>
  </div>
</div>
{% endblock %}
