<nav class="navbar navbar-dark bg-black">
  <div class="container">
    <a class="navbar-brand" href="{% url 'shop:product_list' %}">PeripheryShop</a>
    <form class="d-flex" method="get" action="{% url 'shop:product_list' %}">
      <input class="form-control me-2" type="search" name="q" placeholder="Пошук товарів...">
      <button class="btn btn-outline-light" type="submit">Знайти</button>
    </form>
    <div>
      <a href="{% url 'cart:cart_detail' %}" class="btn btn-outline-light">Кошик ({{ cart|length }})</a>
      {% if user.is_authenticated %}
        <a href="{% url 'accounts:profile' %}" class="btn btn-outline-light">{{ user.username }}</a>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="btn btn-outline-light">Увійти</a>
      {% endif %}
    </div>
  </div>
</nav>
